<div [style.color]="defaultTextColor">
<app-celestial-bg></app-celestial-bg>
<div class="date ui" [style.opacity]="dateUiOpacity + '%'">
  <app-time-unit [unit]="units.WEEK" [value]="datetime.date.week" (change)="changeDateTime($event)">{{datetime.date.week | ordinal}}</app-time-unit>
  <span>{{' '}}</span>
  <app-time-unit [unit]="units.DAY" [value]="datetime.date.day.id" (change)="changeDateTime($event)">{{datetime.date.day.name}}</app-time-unit>
  <span>{{' of '}}</span>
  <app-time-unit [unit]="units.EPOCH" [value]="datetime.date.year.epoch" (change)="changeDateTime($event)">{{datetime.date.year.epoch}}</app-time-unit>
  <span>,</span>
  <app-time-unit [unit]="units.YEAR" [value]="datetime.date.year.year" (change)="changeDateTime($event)">{{datetime.date.year.year}}</app-time-unit>
</div>
<div class="time ui" [style.opacity]="dateUiOpacity + '%'">
  <app-time-unit [unit]="units.HOUR" [value]="datetime.hour" (change)="changeDateTime($event)">{{datetime.getDisplayHour()}}</app-time-unit>
  <span>{{':'}}</span>
  <app-time-unit [unit]="units.MINUTE" [value]="datetime.minute" (change)="changeDateTime($event)">{{datetime.getDisplayMinute()}}</app-time-unit>
  <span>{{' '}}</span>
  <app-time-unit [unit]="units.HALF_DAY" [value]="datetime.isAfternoon() ? 1 : 0" (change)="changeDateTime($event)">{{datetime.getAmPm()}}</app-time-unit>
</div>
<div class="direction ui">
  <app-holdable-button class="bearing" arrow="left" (output)="changeBearing(1)"/>
  <app-holdable-button class="bearing" arrow="right" (output)="changeBearing(-1)"/>
  <app-holdable-button class="elevation" arrow="up" (output)="changeElevation(1)" *ngIf="elevation.angle < elevation.max"/>
  <app-holdable-button class="elevation" arrow="down" (output)="changeElevation(-1)" *ngIf="elevation.angle > elevation.min"/>
</div>
<div class="menubar ui">
  <fa-icon class="clickable" [icon]="menuOpen ? icons.close : icons.menu" (click)="menuOpen = !menuOpen" *ngIf="environment.mobile"/>
  <app-pinned-date class="hidable" [datetime]="datetime" (setDate)="datetime = $event"></app-pinned-date>
  <span class="separator"></span>
  <button class="clickable square" (click)="togglePlayPause()">
    <fa-icon [icon]="icons.play" *ngIf="!playLoop"></fa-icon>
    <fa-icon [icon]="icons.pause" *ngIf="playLoop"></fa-icon>
  </button>
  <button class="clickable hidable" (click)="updateSunPathMode()">Sun path: {{sunPathEnabled ? 'on' : 'off'}}</button>
  <button class="clickable hidable" (click)="updateDateUiOpacity()">Date: {{ dateUiOpacity === 100 ? 'visible' : dateUiOpacity === 0 ? 'hidden' : dateUiOpacity + '%' }}</button>
  <select class="clickable hidable" [(ngModel)]="city">
    <option *ngFor="let city of cities" [ngValue]="city">{{city.name}} ({{city.latitude | degrees: 'minutes'}}, {{city.longitude | degrees: 'minutes'}})</option>
  </select>
  <select class="clickable hidable" [(ngModel)]="bearing" (ngModelChange)="changeBearing()">
    <option *ngFor="let bearing of bearings" [ngValue]="bearing">Face {{bearing.name}}</option>
    <option [ngValue]="bearing" class="hidden">{{bearing.name}}</option>
  </select>
</div>
<div class="menu ui" [class.hidden]="!menuOpen"></div>
<span class="footer ui">
  <a href="http://github.com/lawfulstupid/thyrannic-calendar">v{{environment.appVersion}}</a>
</span>
<div class="drag-sphere"
  (mousedown)="dragStart($event)"
  (mousemove)="drag($event)"
  (mouseup)="dragEnd()"
  (pointerdown)="dragStart($event)"
  (pointermove)="drag($event)"
  (pointerup)="dragEnd()"
></div>
</div>
