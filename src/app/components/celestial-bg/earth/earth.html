<svg:defs>
  <linearGradient id="snowGrad" y1="0%" y2="1000%">
    <stop offset="0%" stop-color="snow"/>
    <stop [attr.offset]="snowCoverage + '%'" stop-color="green"/>
  </linearGradient>
</defs>
<svg:polygon [attr.points]="terrainPath" fill="url(#snowGrad)" [style.filter]="'brightness(' + groundBrightness + ')'"></polygon>
