<svg:path [attr.d]="waterMap | svgPath: true" fill="royalblue" [style.filter]="'brightness(clamp(0.2,' + groundBrightness + ',1))'"/>
<svg:path [attr.d]="terrainMap | svgPath: true" [attr.fill]="'color-mix(in xyz, green, ' + snowCoverage * 100 + '% snow)'" [style.filter]="'brightness(' + groundBrightness + ')'"/>
