<svg viewBox="-50 -50 100 100" preserveAspectRatio="xMidYMax meet" style="position: absolute; left: 0; width: 100vw; top: 0; height: 100vh;">
  <g id="background">
    <g id="sky"/>
    <g id="stars"/>
  </g>
  <g id="solar-system">
    <g id="sun"/>
    <g id="arukma"/>
    <g id="losit"/>
  </g>
  <g class="lat-long" *ngIf="latLongEnabled">
    <path [attr.d]="long(a) | svgPath" *ngFor="let a of [0, 30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330]"/>
    <path [attr.d]="lat(a) | svgPath" *ngFor="let a of [-90, -60, -30, 0, 30, 60, 90]"/>
  </g>
  <g id="foreground">
    <g id="earth"/>
  </g>
</svg>
