<svg:g *ngIf="display"
  [style.--screenX]="screenX"
  [style.--screenY]="90 - screenY"
  [style.--radius]="angularDiameter * embiggenmentFactor * screenSf / 2"
  [style.--color]="color"
  [style.--skyColor]="celestialBodies.earth.skyColor"
  [style.--albedo]="albedo"
  [style.--rotation]="illuminationDirection"
  [style.--illumination]="equatorialIllumination"
>
  <defs>
    <radialGradient id="{{id}}-point">
      <stop stop-color="white" stop-opacity="1" offset="0%"/>
      <stop stop-color="white" stop-opacity="0" offset="100%"/>
    </radialGradient>
    <radialGradient id="{{id}}-aura">
      <stop [attr.stop-color]="color" stop-opacity="1" offset="0%"/>
      <stop [attr.stop-color]="color" [attr.stop-opacity]="(2 * equatorialIllumination - 1) / 1.5" [attr.offset]="(2 * equatorialIllumination - 1) / 1.5"/>
      <stop [attr.stop-color]="color" stop-opacity="0" [attr.offset]="equatorialIllumination | pow: 3"/>
    </radialGradient>
    <mask id="{{id}}-occlusion">
      <rect width="100%" height="100%" fill="white"></rect>
      <ellipse [attr.fill]="equatorialIllumination > 0.5 ? 'white' : 'black'"/>
    </mask>
  </defs>
  <svg:g class="path" *ngIf="path.enabled">
    <polyline *ngFor="let path of path.max" [attr.points]="path" class="lim"/>
    <polyline *ngFor="let path of path.day" [attr.points]="path" class="day"/>
    <polyline *ngFor="let path of path.min" [attr.points]="path" class="lim"/>
  </g>
  <circle class="point" [attr.fill]="'url(#' + id + '-point)'" [attr.opacity]="pointOpacity"/>
  <circle class="disc bg"></circle>
  <circle class="aura" [attr.fill]="'url(#' + id + '-aura)'"/>
  <circle class="disc fg" [attr.mask]="'url(#' + id + '-occlusion)'"></circle>
</g>
